version: '3.9'

services:
  dropbox-mcp:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: dropbox-mcp-server
    ports:
      - "8081:8080"
    environment:
      TRANSPORT: sse
      HOST: 0.0.0.0
      PORT: "8080"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
