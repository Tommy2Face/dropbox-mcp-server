version: '3.9'

services:
  dropbox-mcp:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: dropbox-mcp-dev
    ports:
      - "8081:8080"
    environment:
      TRANSPORT: stdio
      HOST: 0.0.0.0
      PORT: "8080"
    env_file:
      - .env
    volumes:
      - .:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
